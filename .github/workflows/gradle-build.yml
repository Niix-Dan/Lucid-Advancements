name: Gradle Build e Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew build

    - name: Collect and sanitize artifacts
      run: |
        mkdir -p release-artifacts
        
        cp fabric/build/libs/*.jar release-artifacts/
        cp forge/build/libs/*.jar release-artifacts/
        cp neoforge/build/libs/*.jar release-artifacts/
        
        rm -f release-artifacts/*-dev.jar release-artifacts/*-sources.jar release-artifacts/*-plain.jar  release-artifacts/*-javadoc.jar
        
        ls -lh release-artifacts/

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}